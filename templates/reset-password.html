<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <title>Reset Password</title>
    <link rel="icon" href="{{url_for('static',filename='images/logo.png')}}">
</head>

<body>

    <!-- ✅ Flash Messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
    <p class="{{category}}">{{ message }}</p>
    {% endfor %}
    {% endwith %}

    <div id="forgetform" style="display:block;">
        <h1>Reset Password</h1>

        <!-- ✅ FORM FIXED -->
        <form method="post" action="/reset-password">

            <!-- ✅ Hidden Token -->
            <input type="hidden" name="token" value="{{ token }}">

            <!-- New Password -->
            <input type="password" id="password" name="password" placeholder="New Password"
                pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&]).{8,}$"
                title="Must contain at least 8 characters, including uppercase, lowercase, number and special character"
                required>
            <br>

            <!-- Rules -->
            <div class="rules">
                <span id="lower">• Lowercase letter</span>
                <span id="upper">• Uppercase letter</span>
                <span id="number">• Number</span>
                <span id="special">• Special character</span>
                <span id="length">• At least 8 characters</span>
            </div>

            <!-- Confirm Password -->
            <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm Password"
                required>
            <br>

            <div class="submit">
                <button type="submit">Update Password</button>
            </div>

        </form>
    </div>

    <!-- ✅ Password Strength + Match Validation -->
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const password = document.getElementById("password");
            const confirmPassword = document.getElementById("confirm_password");
            const form = document.querySelector("form");

            if (!password) return;

            // Password rules
            password.addEventListener("input", () => {
                const value = password.value;

                const lower = /[a-z]/.test(value);
                const upper = /[A-Z]/.test(value);
                const number = /\d/.test(value);
                const special = /[@$!%*?&]/.test(value);
                const length = value.length >= 8;

                toggle("lower", lower);
                toggle("upper", upper);
                toggle("number", number);
                toggle("special", special);
                toggle("length", length);
            });

            function toggle(id, valid) {
                const el = document.getElementById(id);
                if (!el) return;

                if (valid) {
                    el.classList.add("valid");
                    el.innerHTML = "✔ " + el.textContent.replace("• ", "").replace("✔ ", "");
                } else {
                    el.classList.remove("valid");
                    el.innerHTML = "• " + el.textContent.replace("✔ ", "").replace("• ", "");
                }
            }

            // ✅ Confirm password check
            form.addEventListener("submit", function (e) {
                if (password.value !== confirmPassword.value) {
                    alert("Passwords do not match!");
                    e.preventDefault();
                }
            });
        });
    </script>

</body>

</html>
